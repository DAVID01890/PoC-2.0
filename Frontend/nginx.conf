server {
    listen 80;
    server_name localhost;

    # Directorio de los archivos compilados de React
    root /usr/share/nginx/html;
    index index.html index.htm;

    # Habilitar compresión Gzip para mejorar el rendimiento
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Rutas del cliente (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy inverso para redirigir peticiones de API localmente al contenedor del backend
    location /api/v1 {
        proxy_pass http://backend:8000/api/v1;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Ajustes para CORS y headers estándar
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Caché para archivos estáticos y assets de Velzon
    location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|woff2?|eot|ttf|otf)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }

    # Manejo de errores de servidor
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
